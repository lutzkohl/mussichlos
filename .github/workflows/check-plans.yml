name: Vertretungsplan-Check

on:
  schedule:
    # 17:00 UTC = 19:00 CEST (Sommer) — täglich, auch Wochenende
    - cron: '0 17 * * *'
    # 18:00 UTC = 19:00 CET (Winter) — täglich, auch Wochenende
    - cron: '0 18 * * *'
  # Manuell auslösen zum Testen
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Abhängigkeiten installieren
        run: pip install -r scripts/requirements.txt

      - name: Vertretungspläne prüfen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python scripts/check-plans.py
